<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Interface</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .payment-card { background: white; width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee; }
        .header { background: #2196F3; color: white; text-align: center; padding: 18px; font-weight: bold; font-size: 1.25em; }
        .content { padding: 20px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid #f0f0f0; padding: 12px; border-radius: 8px; }
        .label { color: #888; font-size: 0.85em; }
        .value { font-weight: bold; color: #333; font-size: 1.05em; }
        .copy-btn { color: #2196F3; border: 1.5px solid #2196F3; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75em; font-weight: bold; text-transform: uppercase; }
        
        /* UPI Grid matching your reference image */
        .upi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .upi-item { 
            border: 1px solid #e0e0e0; 
            border-radius: 10px; 
            padding: 15px 12px; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; /* Aligns logos to the left */
            background: #fff; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .upi-item img { height: 28px; width: auto; margin-right: 12px; object-fit: contain; }
        .upi-item span { font-size: 1.1em; font-weight: 600; color: #444; }
        .upi-item:active { border: 1.5px solid #2196F3; background-color: #f0f7ff; }

        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 1em; }
        .submit-btn { width: 100%; background: #2196F3; color: white; border: none; padding: 16px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .notice { color: #d32f2f; font-size: 0.8em; margin-top: 20px; line-height: 1.5; font-weight: 500; }
    </style>
</head>
<body onload="setupInterface()">

            <div class="copy-btn" onclick="copyToClipboard('display_amount')">Copy</div>
        </div>
        <!-- Display Row for UPI ID -->
        <div class="row">
            <div><div class="label">VPA/UPI ID</div><div class="value" id="display_upi">loading...</div></div>

        <p style="font-size:0.85em; color:#666; margin-bottom: 10px;">↓ Fill the UTR numbers after payment</p>
        <input type="text" id="utr_input" class="input-field" placeholder="Input UTR number">
        <button class="submit-btn" onclick="handleSubmit()">Submit UTR</button>

        <div class="notice">
            <b>Notice:</b><br>
            1. One UPI can only transfer money once.<br>
            2. Don't change the payment amount. Otherwise, the order cannot be closed.
        </div>

</div>

<script>
    /* --- EASY EDIT SETTINGS HERE --- */
    const CONFIG = {
        upi_id: "mrrdbindia-1@oksbi", // Change UPI here
        amount: "35000"                       // Change Amount here
    };

    // This sets up the text on the page automatically
    function setupInterface() {
        document.getElementById('display_amount').innerText = CONFIG.amount;
        document.getElementById('display_upi').innerText = CONFIG.upi_id;
    }

    // Opens specific apps without forcing the amount
    function openApp(appName) {
        let package = "";
        switch(appName) {
            case 'phonepe': package = "com.phonepe.app"; break;
            case 'paytm':   package = "net.one97.paytm"; break;
            case 'gpay':    package = "com.google.android.apps.nbu.paisa.user"; break;
            case 'bhim':    package = "in.org.npci.upiapp"; break;
        }
        
        // Removed &am parameter so amount is NOT automatically added
        const intent = `intent://pay?pa=${CONFIG.upi_id}&cu=INR#Intent;scheme=upi;package=${package};end`;
        window.location.href = intent;
    }

    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => alert("Copied: " + text));
    }

    function handleSubmit() {
        const utr = document.getElementById('utr_input').value.trim();
        if (utr.length < 10) {
            alert("Please enter a valid UTR number.");
        } else {
            alert("UTR submitted. Verification in progress.");
        }
    }
</script>

</html>
